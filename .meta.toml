# Generated from:
# https://github.com/plone/meta/tree/2.x/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.9.0"

[pyproject]
codespell_ignores = "foo,bar"
codespell_skip = "*.config.js,*.min.js,*.min.js.map,*.min.css.map,*.svg,pnpm-lock.yaml,*.json,*/tiles.xml"

[gitignore]
extra_lines = """
docs/_static/generated-screenshots

/robot_*
/test_*
/forest.*
"""

[pre_commit]
zpretty_extra_lines = """
        args: ["src/", ]
"""

[tox]
test_matrix = {"6.3" = ["*"], "6.2" = ["*"]}
test_environment_variables = """
    MOSAIC_TESTING_SCREENSHOT_DIR={toxinidir}/docs/_static/generated-screenshots
"""

config_lines = """
    docs
    docs-screenshots
"""

extra_lines = """
[testenv:docs]
description = build documentation
basepython = python3.12
extras =
    docs
deps =
    Sphinx
    myst-parser
    plone-sphinx-theme
    sphinx-copybutton
    sphinx-design
    -c https://dist.plone.org/release/6.3-dev/constraints.txt
commands =
    sphinx-build -b html docs docs/_build/html


[testenv:docs-screenshots]
description = generate screenshots for documentation
use_develop = true
extras =
    test
deps =
    zope.testrunner
    -c https://dist.plone.org/release/6.3-dev/constraints.txt
set_env =
    ROBOT_OPTIONS=--include robot:docs
    MOSAIC_TESTING_SCREENSHOT_DIR={toxinidir}/docs/_static/generated-screenshots
allowlist_externals =
    mkdir
commands =
    rfbrowser init chromium
    mkdir -p {env:MOSAIC_TESTING_SCREENSHOT_DIR}
    zope-testrunner --all --test-path={toxinidir}/src -s plone.app.mosaic --module test_robot {posargs}
"""

[github]
jobs = [
   "qa",
   "coverage",
   "release_ready",
   "circular",
]
