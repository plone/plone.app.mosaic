# Generated from:
# https://github.com/plone/meta/tree/2.x/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.9.1.dev0"

[pyproject]
codespell_ignores = "foo,bar"
codespell_skip = "*.min.js,*.min.js.map,*.min.css.map,*.svg,yarn.lock,*.json,*/tiles.xml"

[gitignore]
extra_lines = """
robot_*
test_*
forest.*
"""

[pre_commit]
zpretty_extra_lines = """
        args: ["src/", ]
"""

[tox]
# for 3.x maintenance we have our own chromedriver setup for the selenium tests
use_test_matrix = false

[github]
jobs = [
   "qa",
   "coverage",
   "release_ready",
   "circular",
]
